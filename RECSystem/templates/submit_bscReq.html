<!-- LOGIN PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIC REC - Home</title>

    <link rel="stylesheet" href="../static/css/submit_bscReq.css">
</head>

<!-- home section start -->
{% load static %}
<body>
  <header>
      <div class="header">
          <nav class="navbar">
              <a href="{% url 'home' %}" class="menus">Home</a>
              <a href="" class="menus">About</a>
              <a href="" class="menus" id="cntctUs">Contact<span>Us</span></a>
          </nav>
          <div class="icons">
              <img src="../static/images/notification-icon.png" alt="" id="icons">
              <img src="../static/images/user-icon.png" alt="" id="icons">
          </div>
      </div>
  </header>
  <div class="container">
    <ul>
      <li><a href="#" class="active"><span>1</span> Basic Requirements</a></li>
      <li><a href="{% url 'rec-requirements' %}"><span>2</span> REC Requirements</a></li> 
      <li><a href="{% url 'payment' %}"><span>3</span> Payment</a></li>
      <li><a href="{% url 'feedback' %}"><span>4</span> Feedback</a></li>
      <li><a href="{% url 'certification' %}"><span>5</span> Ethics Compliance Certificate</a></li>
    </ul>
  </div>
  <div class="form_container">
    <form action="submit" method="get">
      <div class="form_section">
        <div class="input_container">
          <div class="input_box">
            <label for="protocol_code">Protocol Code: </label>
            <input type="number" id="input_text" required>
          </div>
          <div class="input_box">
            <label for="protocol_title">Protocol Title: </label>
            <input type="text" id="input_text" required>
            <label class="input_label" id="title_label">Title of the study</label>
          </div>
          <div class="input_box">
            <label for="principal_investigator">Principal Investigator(s): </label>
            <textarea name="text" id="textarea" cols="30" rows="10"spellcheck="false"></textarea>            
            <label class="input_label" id="researcher_label">Researcher(s)</label></div>
        </div>
        <div class="files_container">
          <p>Attachments</p>
          <div class="file_box">
            <label for="principal_investigator">Minutes of proposal defense <br></label>
            <input type="file" name="input_file" id="input_file">
          </div>
          <div class="file_box">
            <label for="principal_investigator">Revised copy of the Manuscript <br></label>
            <input type="file" name="input_file" id="input_file">
          </div>
          <div class="file_box">
            <label for="principal_investigator">Routing form <br></label>
            <input type="file" name="input_file" id="input_file">
          </div>
          <div class="file_box">
            <label for="principal_investigator">Adviser's Endorsement for Ethics Review <br></label>
            <input type="file" name="input_file" id="input_file">
          </div>
          <div class="button">
            <button class="submit" type="submit">Submit for review</button>
          </div>
        </div>
      </div>
    </form>
  </div>
</body>
</html>
